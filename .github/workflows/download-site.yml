name: Download Website with wget

on:
  workflow_dispatch:

jobs:
  download-job:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install httrack (alternative tool)
        run: sudo apt-get update && sudo apt-get install -y httrack

      - name: Download website with httrack
        run: |
          httrack https://example.com -O ./my-website-backup \
            --mirror \
            --robots=0 \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            --timeout=60 \
            --max-rate=1000000
          
          # اگر httrack کار نکرد، از wget استفاده کن
          if [ ! -d "./my-website-backup" ]; then
            wget --mirror --convert-links --adjust-extension \
                 --page-requisites --no-parent \
                 --wait=2 --limit-rate=100k \
                 --user-agent="Mozilla/5.0" \
                 https://example.com
            mkdir -p my-website-backup
            cp -r example.com/* my-website-backup/ 2>/dev/null || true
          fi

      - name: List downloaded files
        run: |
          echo "## 📁 فایل‌های دانلود شده" >> $GITHUB_STEP_SUMMARY
          ls -la my-website-backup/ >> $GITHUB_STEP_SUMMARY
