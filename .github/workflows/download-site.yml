name: Download Any Website (Fixed)

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 12 * * *'

jobs:
  download-job:
    runs-on: ubuntu-latest
    env:
      # این خط اخطار Node.js را خاموش می‌کند و از Node.js 24 استفاده می‌کند
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'  # تغییر نسخه به 22 که با Playwright سازگارتر است

      - name: Install AnyDownload and dependencies
        run: |
          npm install -g anydownload || true
          PKG_PATH=$(find /opt/hostedtoolcache/node -name "package.json" -path "*/anydownload/package.json" 2>/dev/null | head -1)
          if [ -n "$PKG_PATH" ]; then
            sed -i '1s/^\xEF\xBB\xBF//' "$PKG_PATH"
            npm install -g puppeteer@latest
          
          npx playwright install --with-deps  # نصب کامل وابستگی‌های سیستم

      - name: Download the website (with retry and headers)
        run: |
          # استفاده از --user-agent برای شبیه‌سازی مرورگر واقعی
          anydownload https://zoomit.ir \
            --browser playwright \
            --dynamic \
            --recursive \
            --max-depth 3 \
            --timeout 60000 \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            --output my-website-backup || true
          # || true یعنی اگر خطا هم داد، وورکفلو را متوقف نکن
